version: "3.8"
services:
  api_test:
    container_name: api_test
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - TEST=1
    entrypoint: >
      sh -c "
        python -m alembic upgrade head
        python -m pytest -vv
      "
    networks:
      - api_test
    ports:
      - "8000:8000"
    depends_on:
      test:
        condition: service_healthy
  test:
    container_name: "postgre_db"
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgre22
      - POSTGRES_TESTDB=test_db
    expose:
      - 5432
    networks:
      - api_test
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d ${POSTGRES_TESTDB} -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 20s
      retries: 100

networks:
  api_test:
    driver: bridge
